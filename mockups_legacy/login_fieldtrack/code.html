<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .diagonal-stripes {
            background-color: #FFDBFD;

            background-blend-mode: overlay;

    body {

<body class="min-h-screen flex items-center justify-center font-body-md text-on-background diagonal-stripes overflow-x-hidden">
<!-- Background Decoration -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-primary-container/20 blur-[100px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-96 h-96 bg-secondary-container/20 blur-[100px] rounded-full"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-[440px] px-container-margin-mobile md:px-0">
<div class="bg-white border border-soft-accent rounded-xl p-xl shadow-sm transition-all duration-300 hover:border-primary-container/40">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-xl">
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center mb-md transform rotate-3 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-[40px]" data-icon="track_changes">track_changes</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-brand-accent tracking-tight">
                    FieldTrack
                </h1>
<p class="font-label-md text-label-md text-on-surface-variant mt-base">
                    Secure Field Access Portal
                </p>
</div>
<!-- Form -->
<form class="space-y-lg" id="loginForm" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-base">
<label class="block font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px] group-focus-within:text-brand-accent transition-colors" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-[48px] pr-md py-3 bg-white border border-soft-accent rounded-lg font-body-md text-on-surface placeholder-outline-variant focus:outline-none focus:ring-2 focus:ring-soft-accent focus:border-brand-accent transition-all" id="email" name="email" placeholder="agent@fieldtrack.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-base">
<div class="flex justify-between items-center">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-brand-accent hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px] group-focus-within:text-brand-accent transition-colors" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-[48px] pr-[48px] py-3 bg-white border border-soft-accent rounded-lg font-body-md text-on-surface placeholder-outline-variant focus:outline-none focus:ring-2 focus:ring-soft-accent focus:border-brand-accent transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-md flex items-center text-outline hover:text-brand-accent transition-colors" id="togglePassword" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility" id="eyeIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 text-brand-accent focus:ring-soft-accent border-soft-accent rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-base block font-label-sm text-label-sm text-on-surface-variant" for="remember-me">
                        Keep me signed in for 30 days
                    </label>
</div>
<!-- Sign In Button -->
<button class="w-full bg-brand-accent text-white py-3 px-md rounded-lg font-label-md text-label-md hover:bg-[#8494FF] active:scale-[0.98] transition-all shadow-md shadow-brand-accent/20 flex items-center justify-center gap-base" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[18px]" data-icon="login">login</span>
</button>
</form>
<!-- Secondary Actions -->
<div class="mt-xl pt-lg border-t border-outline-variant flex flex-col items-center gap-md">
<p class="font-label-sm text-label-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-brand-accent font-bold hover:underline" href="#">Request Access</a>
</p>
<div class="flex items-center gap-base">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant">System Status: Operational</span>
</div>
</div>
</div>
<!-- Footer -->
<footer class="mt-xl text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant/60">
                © 2024 FieldTrack Professional Systems. All rights reserved.
            </p>
</footer>
</main>
<script>
        // Password Visibility Toggle Logic
        const passwordInput = document.getElementById('password');
        const toggleButton = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');

        toggleButton.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeIcon.textContent = isPassword ? 'visibility_off' : 'visibility';
        });

        // Simple login animation/interaction
        document.getElementById('loginForm').addEventListener('submit', function() {
            const btn = this.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Authenticating...';
            
            // Mock delay for UI demonstration
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> Success';
                btn.classList.replace('bg-brand-accent', 'bg-green-600');
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-green-600', 'bg-brand-accent');
                    btn.disabled = false;
                }, 1000);
            }, 1500);
        });
    </script>
</body></html>
