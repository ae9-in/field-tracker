<script>
        // Simple micro-interactions for the recording pulse
        const micBtn = document.querySelector('.bg-error');
        let isRecording = true;

        micBtn?.addEventListener('click', () => {
            isRecording = !isRecording;
            const text = micBtn.nextElementSibling;
            if (isRecording) {
                micBtn.classList.add('ring-4', 'ring-error/20');
                text.classList.remove('invisible');
                text.innerHTML = '00:42 Recording...';
            } else {
                micBtn.classList.remove('ring-4', 'ring-error/20');
                text.innerHTML = 'Recording Paused';
            }
        });
